name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }})
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rustTargets: "x86_64-apple-darwin"
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles appimage,deb"
            rustTargets: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-22.04-arm"
            args: "--bundles appimage,deb"
            rustTargets: "aarch64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: bun install

      - name: configure updater
        run: |
          node -e 'const fs = require("fs"); const config = { bundle: { createUpdaterArtifacts: true } }; fs.appendFileSync(process.env.GITHUB_ENV, `TAURI_CONFIG=${JSON.stringify(config)}\n`);'

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Syncarts v__VERSION__"
          releaseBody: |
            ## 📥 Download Links

            🍏 [Download for Mac (Apple M-Series)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/Syncarts___VERSION___aarch64.dmg)
            🍏 [Download for Mac (Intel)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/Syncarts___VERSION___x64.dmg)

            > **Mac users:** after installing, if macOS says the app is damaged/can't be opened, run this in Terminal:
            > ```
            > sudo xattr -cr /Applications/Syncarts.app
            > ```

            🐧 [Download for Linux x64 (.AppImage)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/syncarts___VERSION___amd64.AppImage)
            🐧 [Download for Linux x64 (.deb)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/syncarts___VERSION___amd64.deb)
            🐧 [Download for Linux ARM64 (.AppImage)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/syncarts___VERSION___aarch64.AppImage)
            🐧 [Download for Linux ARM64 (.deb)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/syncarts___VERSION___arm64.deb)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
