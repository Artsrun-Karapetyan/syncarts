name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }})
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rustTargets: "x86_64-apple-darwin"
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles appimage,deb"
            rustTargets: "x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: bun install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Syncarts v__VERSION__"
          releaseBody: |
            ## 📥 Download Links

            🍏 [Download for Mac (Apple M-Series)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/Syncarts___VERSION___aarch64.dmg)
            🍏 [Download for Mac (Intel)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/Syncarts___VERSION___x64.dmg)

            🐧 [Download for Linux (.AppImage)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/syncarts___VERSION___amd64.AppImage)
            🐧 [Download for Linux (.deb)](https://github.com/${{ github.repository }}/releases/download/app-v__VERSION__/syncarts___VERSION___amd64.deb)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
